<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 500</title>
    <link rel="icon" href="../static/iconerror.png">
    <style>
        @font-face {
            font-family: Coolvetica;
            src: url('coolvetica.otf') format('opentype');
        }
        *{
            margin: 0;
            font-family: Coolvetica;
            color: white;
        }
        .wrapper{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .error{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 6px;
            letter-spacing: 1px;
            text-align: center;
        }
        body{
            background-image: linear-gradient(to left, #640B0B, #AA4444);
            background-size: cover;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class = "error">
            <h3>There has been an error. Could you kindly screenshot this page and contact @anonymouslyanonymous on Discord.</h3>
            <pre><code>{{error}}</code></pre>
        </div>
    </div>
</body>
</html>
